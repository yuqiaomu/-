<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的工具站</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #5f6368;
            --border: #e8eaed;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-hover: 0 6px 20px rgba(0, 0, 0, 0.10), 0 2px 6px rgba(0, 0, 0, 0.06);
            --accent: #4a6cf7;
            --accent-light: #eef1ff;
            --accent-hover: #3b5de7;
            --search-bg: #ffffff;
            --search-border: #dde1e6;
            --search-focus-border: #4a6cf7;
            --search-focus-shadow: 0 0 0 3px rgba(74, 108, 247, 0.12);
            --tag-bg: #f1f3f9;
            --tag-text: #5f6368;
            --divider: #eee;
            --toggle-bg: #e8eaed;
            --toggle-dot: #ffffff;
            --card-accent-net: #4a6cf7;
            --card-accent-dev: #10b981;
            --card-accent-media: #f59e0b;
        }

        .dark {
            --bg: #1a1b1e;
            --card-bg: #242529;
            --text: #e4e4e7;
            --text-secondary: #9ca3af;
            --border: #33353a;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.25), 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-hover: 0 6px 24px rgba(0, 0, 0, 0.40), 0 2px 8px rgba(0, 0, 0, 0.30);
            --accent: #6d8cff;
            --accent-light: #252840;
            --accent-hover: #8aa3ff;
            --search-bg: #242529;
            --search-border: #3a3c42;
            --search-focus-border: #6d8cff;
            --search-focus-shadow: 0 0 0 3px rgba(109, 140, 255, 0.18);
            --tag-bg: #2a2c33;
            --tag-text: #9ca3af;
            --divider: #2e3036;
            --toggle-bg: #3a3c42;
            --toggle-dot: #1a1b1e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 16px 60px;
            transition: background 0.35s ease, color 0.35s ease;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            width: 100%;
            max-width: 640px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* ========== 顶部栏 ========== */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
        }

        /* 主题切换按钮 */
        .theme-toggle {
            position: relative;
            width: 48px;
            height: 28px;
            background: var(--toggle-bg);
            border-radius: 28px;
            border: none;
            cursor: pointer;
            transition: background 0.35s ease;
            flex-shrink: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .theme-toggle:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }
        .theme-toggle .dot {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 22px;
            height: 22px;
            background: var(--toggle-dot);
            border-radius: 50%;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), background 0.35s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
        }
        .dark .theme-toggle .dot {
            transform: translateX(20px);
        }
        .theme-toggle .dot svg {
            width: 14px;
            height: 14px;
            transition: opacity 0.25s ease, transform 0.35s ease;
            position: absolute;
        }
        .theme-toggle .sun-icon {
            opacity: 1;
            transform: rotate(0deg);
            color: #f59e0b;
        }
        .theme-toggle .moon-icon {
            opacity: 0;
            transform: rotate(-90deg);
            color: #a5b4fc;
        }
        .dark .theme-toggle .sun-icon {
            opacity: 0;
            transform: rotate(90deg);
        }
        .dark .theme-toggle .moon-icon {
            opacity: 1;
            transform: rotate(0deg);
        }

        /* ========== 头部标题 ========== */
        .header {
            text-align: center;
            padding: 8px 0 0;
        }
        .header .icon-row {
            font-size: 40px;
            margin-bottom: 6px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }
        .header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text);
            margin: 0;
        }
        .header .subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
            font-weight: 400;
        }

        /* ========== 搜索框 ========== */
        .search-wrapper {
            position: relative;
            width: 100%;
        }
        .search-input {
            width: 100%;
            padding: 14px 48px 14px 44px;
            font-size: 16px;
            border: 2px solid var(--search-border);
            border-radius: 14px;
            background: var(--search-bg);
            color: var(--text);
            outline: none;
            transition: all 0.25s ease;
            font-family: inherit;
            letter-spacing: 0.2px;
        }
        .search-input::placeholder {
            color: #9ca3af;
            font-size: 15px;
        }
        .search-input:focus {
            border-color: var(--search-focus-border);
            box-shadow: var(--search-focus-shadow);
        }
        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #9ca3af;
            transition: color 0.25s ease;
        }
        .search-wrapper:focus-within .search-icon {
            color: var(--accent);
        }
        .search-clear {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
            transition: all 0.2s ease;
            font-size: 18px;
            line-height: 1;
        }
        .search-clear.visible {
            display: flex;
        }
        .search-clear:hover {
            background: var(--tag-bg);
            color: var(--text);
        }
        .search-hint {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            padding-left: 4px;
            flex-wrap: wrap;
        }
        .search-hint kbd {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--tag-bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 2px 7px;
            font-size: 11px;
            font-family: inherit;
            font-weight: 500;
            letter-spacing: 0.3px;
            min-width: 20px;
            color: var(--text-secondary);
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.08);
        }

        /* ========== 分类区块 ========== */
        .section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .section-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-secondary);
            padding-left: 6px;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .section-title .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }
        .dot-net {
            background: var(--card-accent-net);
        }
        .dot-dev {
            background: var(--card-accent-dev);
        }
        .dot-media {
            background: var(--card-accent-media);
        }

        /* ========== 工具卡片网格 ========== */
        .tools-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        @media (max-width: 480px) {
            .tools-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ========== 单个工具卡片 ========== */
        .tool-card {
            display: flex;
            align-items: flex-start;
            gap: 11px;
            background: var(--card-bg);
            padding: 14px 16px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text);
            box-shadow: var(--shadow);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border: 1px solid transparent;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        .tool-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            border-radius: 0 3px 3px 0;
            transition: all 0.25s ease;
            opacity: 0.7;
        }
        .tool-card.accent-net::before {
            background: var(--card-accent-net);
        }
        .tool-card.accent-dev::before {
            background: var(--card-accent-dev);
        }
        .tool-card.accent-media::before {
            background: var(--card-accent-media);
        }
        .tool-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
            border-color: var(--border);
        }
        .tool-card:active {
            transform: scale(0.975);
            transition: transform 0.1s ease;
        }
        .tool-card:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }
        .tool-card .tool-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            background: var(--accent-light);
            transition: background 0.35s ease;
        }
        .tool-card .tool-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
            min-width: 0;
        }
        .tool-card .tool-name {
            font-weight: 600;
            font-size: 14.5px;
            letter-spacing: -0.1px;
            line-height: 1.3;
            color: var(--text);
        }
        .tool-card .tool-desc {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ========== 页脚 ========== */
        .footer {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            opacity: 0.6;
            padding-top: 8px;
            letter-spacing: 0.3px;
        }

        /* ========== Toast 提示 ========== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            pointer-events: none;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .dark .toast {
            background: #e4e4e7;
            color: #1a1b1e;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

    <script>
        (function() {
            // ==================== 主题管理 ====================
            const html = document.documentElement;
            const themeToggle = document.getElementById('themeToggle');
            const STORAGE_KEY = 'toolstation-theme';

            function getSystemTheme() {
                return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }

            function applyTheme(theme) {
                if (theme === 'dark') {
                    html.classList.add('dark');
                } else {
                    html.classList.remove('dark');
                }
            }

            function getSavedTheme() {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved === 'dark' || saved === 'light') {
                    return saved;
                }
                return null;
            }

            // 初始化主题（在页面渲染前已通过内联脚本设置，这里做兜底）
            const initialTheme = getSavedTheme() || getSystemTheme();
            applyTheme(initialTheme);

            // 监听系统主题变化（仅在用户未手动设置时生效）
            const systemThemeQuery = window.matchMedia('(prefers-color-scheme: dark)');
            systemThemeQuery.addEventListener('change', (e) => {
                if (!getSavedTheme()) {
                    applyTheme(e.matches ? 'dark' : 'light');
                }
            });

            // 主题切换按钮
            themeToggle.addEventListener('click', () => {
                const isDark = html.classList.contains('dark');
                const newTheme = isDark ? 'light' : 'dark';
                applyTheme(newTheme);
                localStorage.setItem(STORAGE_KEY, newTheme);
                // 点击动画反馈
                themeToggle.style.transform = 'scale(0.9)';
                setTimeout(() => {
                    themeToggle.style.transform = '';
                }, 150);
            });
            // 添加过渡属性
            themeToggle.style.transition = 'transform 0.2s ease';

            // ==================== 搜索功能 ====================
            const searchInput = document.getElementById('searchInput');
            const searchClear = document.getElementById('searchClear');
            const searchWrapper = document.getElementById('searchWrapper');

            function isLikelyURL(str) {
                const trimmed = str.trim();
                // 以 http:// 或 https:// 开头
                if (/^https?:\/\//i.test(trimmed)) return true;
                // 包含点号、无空格、看起来像域名（排除纯数字和中文）
                if (trimmed.includes('.') &&
                    !/\s/.test(trimmed) &&
                    !/[\u4e00-\u9fff]/.test(trimmed) &&
                    /^[a-zA-Z0-9._~:/?#[\]@!$&'()*+,;=%\-]+$/.test(trimmed) &&
                    /\.[a-zA-Z]{2,}/.test(trimmed)) {
                    return true;
                }
                // localhost
                if (/^localhost(:\d+)?(\/.*)?$/i.test(trimmed)) return true;
                return false;
            }

            function buildURL(input) {
                const trimmed = input.trim();
                if (/^https?:\/\//i.test(trimmed)) return trimmed;
                return 'https://' + trimmed;
            }

            function buildGoogleSearchURL(query) {
                return 'https://www.google.com/search?q=' + encodeURIComponent(query.trim());
            }

            function handleSearch() {
                const value = searchInput.value.trim();
                if (!value) return;
                if (isLikelyURL(value)) {
                    window.open(buildURL(value), '_blank');
                } else {
                    window.open(buildGoogleSearchURL(value), '_blank');
                }
                // 搜索后保留输入内容，方便用户查看/修改
                // 同时短暂高亮搜索框
                searchInput.style.borderColor = 'var(--accent)';
                searchInput.style.boxShadow = 'var(--search-focus-shadow)';
                setTimeout(() => {
                    searchInput.style.borderColor = '';
                    searchInput.style.boxShadow = '';
                }, 600);
            }

            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleSearch();
                }
                // Escape 清除搜索
                if (e.key === 'Escape') {
                    searchInput.value = '';
                    updateClearButton();
                    searchInput.blur();
                }
            });

            // 清除按钮
            searchClear.addEventListener('click', () => {
                searchInput.value = '';
                updateClearButton();
                searchInput.focus();
            });

            searchInput.addEventListener('input', updateClearButton);

            function updateClearButton() {
                if (searchInput.value.trim().length > 0) {
                    searchClear.classList.add('visible');
                } else {
                    searchClear.classList.remove('visible');
                }
            }

            // 全局快捷键：按 / 聚焦搜索框
            document.addEventListener('keydown', (e) => {
                // 如果焦点在输入框内，不处理
                if (document.activeElement === searchInput ||
                    document.activeElement === document.body ||
                    document.activeElement === null ||
                    document.activeElement.tagName === 'BODY') {
                    if (e.key === '/' && document.activeElement !== searchInput) {
                        e.preventDefault();
                        searchInput.focus();
                        searchInput.select();
                    }
                }
            });

            // ==================== Toast 提示 ====================
            const toast = document.getElementById('toast');
            let toastTimer = null;

            function showToast(message, duration = 2000) {
                if (toastTimer) clearTimeout(toastTimer);
                toast.textContent = message;
                toast.classList.add('show');
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                    toastTimer = null;
                }, duration);
            }

            // ==================== 卡片长按复制链接（移动端友好） ====================
            let longPressTimer = null;
            const toolCards = document.querySelectorAll('.tool-card');

            toolCards.forEach(card => {
                const href = card.getAttribute('href');

                // 长按检测（移动端）
                card.addEventListener('touchstart', (e) => {
                    longPressTimer = setTimeout(() => {
                        e.preventDefault();
                        copyToClipboard(href);
                        showToast('✅ 链接已复制');
                    }, 600);
                }, { passive: false });

                card.addEventListener('touchend', () => {
                    if (longPressTimer) clearTimeout(longPressTimer);
                });
                card.addEventListener('touchmove', () => {
                    if (longPressTimer) clearTimeout(longPressTimer);
                });

                // 鼠标中键或右键复制（桌面端辅助）
                card.addEventListener('contextmenu', (e) => {
                    // 不阻止默认右键菜单，但提供额外的复制提示
                    // 用户可通过浏览器默认菜单复制链接
                });
            });

            function copyToClipboard(text) {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).catch(() => {
                        fallbackCopy(text);
                    });
                } else {
                    fallbackCopy(text);
                }
            }

            function fallbackCopy(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.left = '-9999px';
                textarea.style.top = '-9999px';
                document.body.appendChild(textarea);
                textarea.focus();
                textarea.select();
                try {
                    document.execCommand('copy');
                } catch (e) {
                    // 复制失败
                }
                document.body.removeChild(textarea);
            }

            // ==================== 页面加载完成 ====================
            updateClearButton();
            console.log('🔧 工具站已就绪 | 按 / 快速聚焦搜索框 | 长按卡片复制链接');
        })();
    </script>
</body>
</html>
